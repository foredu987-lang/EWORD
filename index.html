        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];

      state.topic.blanks.forEach(b => {

          </div>
        </div>
      `;
    };

    // 2. 預習頁面 (有全文解答與語音播放)
    const renderPreview = () => {
      const rawParagraphs = state.topic.content.split(/\n\n/);
      const speedIndex = speedMap.indexOf(state.playbackSpeed) !== -1 ? speedMap.indexOf(state.playbackSpeed) : 2;
      
      let paragraphsHtml = rawParagraphs.map((para, index) => {
        // 取出純文字版（給語音引擎讀）
        const filledParaText = getFilledText(para, state.topic.blanks);
        state.previewParagraphs[index] = filledParaText; 

        // 標記正確答案的 HTML 版（給畫面顯示）
        const highlightedHtml = para.replace(/___(\d+)___/g, (match, idStr) => {
          const id = parseInt(idStr, 10);
          const blank = state.topic.blanks.find(b => b.id === id);
          return `<span class="text-indigo-700 font-extrabold bg-indigo-100 px-1 rounded underline">${blank.correct}</span>`;
        }).replace(/\n/g, '<br>');

        return `
          <div class="relative bg-slate-50 p-5 rounded-xl border border-slate-200 mb-6 group">
            <button data-action="speak" data-idx="${index}" class="absolute top-3 right-3 bg-white border border-gray-300 shadow-sm text-gray-600 hover:bg-indigo-100 hover:text-indigo-700 hover:border-indigo-300 px-3 py-1.5 rounded-full text-sm font-bold flex items-center gap-1 transition-all z-10">
              🔊 播放段落
            </button>
            <p class="text-lg text-gray-800 leading-loose pt-10 sm:pt-0 sm:pr-28 relative">
              ${highlightedHtml}
            </p>
            
            <!-- 播放速度滑竿 (置於段落下方) -->
            <div class="mt-4 pt-3 border-t border-slate-200 flex items-center justify-end gap-2 sm:gap-3">
              <span class="text-sm font-bold text-gray-500">🔊 語速:</span>
              <input type="range" data-action="changeSpeed" min="0" max="3" step="1" value="${speedIndex}" class="w-24 sm:w-32 cursor-pointer">
              <span class="speed-label text-sm font-bold text-indigo-700 w-10 text-right">${state.playbackSpeed}x</span>
            </div>
          </div>
        `;
      }).join('');

      return `
        <div class="max-w-4xl w-full mx-auto mt-4 sm:mt-8 p-5 sm:p-8 bg-white rounded-2xl shadow-xl border-t-8 border-yellow-400">
          <div class="text-center mb-6">
            <span class="bg-yellow-100 text-yellow-800 font-bold px-3 py-1 rounded-full text-sm mb-3 inline-block">考前預習模式</span>
            <h2 class="text-2xl sm:text-3xl font-black text-gray-800">${state.topic.title}</h2>
            <p class="text-gray-500 mt-2">請先閱讀完整文章，點擊右上方喇叭可聆聽發音。</p>
          </div>

          <!-- 上方 開始測驗按鈕 -->
          <div class="flex justify-center mb-8">
            <button data-action="startQuiz" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-10 rounded-full shadow-md transition-all transform hover:scale-105 text-lg">
              👉 我準備好了，開始測驗！
            </button>
          </div>

          <div class="mb-8">
            ${paragraphsHtml}
          </div>

          <!-- 下方 開始測驗按鈕 -->
          <div class="flex justify-center mt-8 border-t pt-8 border-gray-100">
            <button data-action="startQuiz" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-12 rounded-full shadow-lg transition-all transform hover:scale-105 text-xl">
              👉 閱讀完畢，開始測驗！
            </button>
          </div>
        </div>
      `;
    };

    // 3. 雙欄測驗進行中
    const renderPlaying = () => {
      const parts = state.topic.content.split(/(___\d+___)/g);
      const articleHtml = parts.map(part => {
        const match = part.match(/___(\d+)___/);
        if (match) {
          const blankId = parseInt(match[1], 10);
          const answer = state.answers[blankId];
          const isActive = state.activeBlankId === blankId;
          
          let btnClass = "mx-1 my-1 px-3 py-0.5 rounded-md min-w-[3.5rem] font-bold transition-all duration-200 border-b-2 ";
          if (isActive) btnClass += "bg-indigo-600 text-white border-indigo-800 shadow-md transform scale-110";
          else if (answer) btnClass += "bg-indigo-100 text-indigo-800 border-indigo-400 hover:bg-indigo-200";
          else btnClass += "bg-gray-100 text-gray-400 border-gray-400 hover:bg-gray-200";
          
          const text = answer ? answer : (isActive ? '選擇中...' : '____');
          return `<button data-action="blank" data-id="${blankId}" class="${btnClass}">${text}</button>`;
        }
        return part.replace(/\n/g, '<br><br>');
      }).join('');

      const usedWords = Object.values(state.answers);
      const filledCount = Object.keys(state.answers).length;
      const totalCount = state.topic.blanks.length;

      const wordBankHtml = state.wordBank.map((word, idx) => {
        const countInAnswers = usedWords.filter(w => w === word).length;
        const countInBank = state.wordBank.slice(0, idx + 1).filter(w => w === word).length;
        const isUsed = countInBank <= countInAnswers;
        
        let btnClass = "px-3 py-2 rounded-lg font-bold text-sm transition-all ";
        let disabledAttr = "";

        if (isUsed) {
          btnClass += "bg-gray-200 text-gray-400 opacity-60 cursor-not-allowed line-through";
          disabledAttr = "disabled";
        } else if (state.activeBlankId !== null) {
          btnClass += "bg-white text-indigo-700 border-2 border-indigo-200 hover:border-indigo-500 hover:bg-indigo-50 shadow-sm active:scale-95";
        } else {
          btnClass += "bg-white text-gray-400 border-2 border-gray-100 cursor-not-allowed";
          disabledAttr = "disabled";
        }

        return `<button data-action="${isUsed ? '' : 'word'}" data-word="${word}" ${disabledAttr} class="${btnClass}">${word}</button>`;
      }).join('');

      const submitBtnClass = filledCount === totalCount 
        ? 'bg-green-500 hover:bg-green-600 text-white animate-bounce' 
        : 'bg-indigo-600 hover:bg-indigo-700 text-white';
      const submitText = filledCount === totalCount ? '確認交卷 ✅' : '提早交卷';

      return `
        <div class="max-w-7xl w-full mx-auto mt-2 sm:mt-8 bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col h-[92vh] sm:h-[85vh] border border-gray-200">
          <div class="bg-indigo-50 p-3 sm:p-4 border-b border-indigo-100 shrink-0">
            <div class="flex justify-between items-center mb-1 sm:mb-2">
              <h2 class="text-sm sm:text-base font-bold text-indigo-800 truncate pr-2">${state.topic.title}</h2>
              <span class="bg-indigo-600 text-white text-xs font-bold px-3 py-1 rounded-full whitespace-nowrap shrink-0">
                進度: ${filledCount} / ${totalCount}
              </span>
            </div>
            <p class="text-xs sm:text-sm text-indigo-600 font-medium">
              💡 玩法：1. 點擊文章空格 👉 2. 從右方/下方選擇單字。 (點擊已填空格可取消)
            </p>
          </div>
          
          <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
            <!-- 左欄：文章 -->
            <div class="flex-1 p-4 sm:p-8 overflow-y-auto text-base sm:text-lg text-gray-800 font-medium leading-loose bg-white">
              ${articleHtml}
            </div>

            <!-- 右欄/下欄：單字庫 -->
            <div class="w-full md:w-1/3 lg:w-[350px] bg-slate-50 p-4 sm:p-6 border-t-4 md:border-t-0 md:border-l-4 border-slate-200 shrink-0 overflow-y-auto flex flex-col shadow-inner max-h-[35vh] md:max-h-none">
              <h3 class="text-indigo-800 font-bold mb-3 hidden md:flex items-center gap-2">
                <span>🗂️</span> 單字庫 (Word Bank)
              </h3>
              <div class="flex flex-wrap gap-2 sm:gap-3">
                ${wordBankHtml}
              </div>
              <div class="mt-6 md:mt-auto pt-4 flex justify-center border-t border-slate-200 md:border-none">
                <button data-action="submit" class="w-full py-3 rounded-xl font-bold text-lg shadow-md transition-all ${submitBtnClass}">
                  ${submitText}
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
    };

    // 4. 測驗結果
    const renderResults = () => {
      const finalScore = calculateScore();
      const isHighScore = finalScore >= 80;
      const incorrectBlanks = state.topic.blanks.filter(b => state.answers[b.id] !== b.correct);

      let confettiHtml = '';
      if (isHighScore) {
        confettiHtml = '<div class="fixed inset-0 pointer-events-none overflow-hidden z-50">';
        const emojis = ['🎉', '✨', '🏆', '💯', '🔥'];
        for (let i = 0; i < 50; i++) {
          const emoji = emojis[Math.floor(Math.random() * emojis.length)];
          const left = Math.random() * 100;
          const delay = Math.random() * 3;
          const duration = 2 + Math.random() * 3;
          confettiHtml += `<div class="absolute text-3xl animate-confetti" style="left: ${left}vw; animation-delay: ${delay}s; animation-duration: ${duration}s;">${emoji}</div>`;
        }
        confettiHtml += '</div>';
      }

      let errorsHtml = '';
      if (incorrectBlanks.length > 0) {
        const errorListHtml = incorrectBlanks.map(b => {
          const parts = state.topic.content.split(/(?<=[.!?])\s+/);
          const targetTag = `___${b.id}___`;
          const sentence = parts.find(p => p.includes(targetTag)) || "...";
          const contextHtml = sentence.split(targetTag).map((s, i, arr) => {
            return s + (i < arr.length - 1 ? `<span class="text-green-600 font-bold bg-green-100 px-1 rounded mx-1 underline">${b.correct}</span>` : '');
          }).join('');

          const userAnswer = state.answers[b.id] || '(未作答)';

          return `
            <div class="bg-red-50 rounded-xl p-5 border border-red-100">
              <div class="mb-3 text-gray-700 text-base sm:text-lg leading-relaxed">
                <span class="font-bold text-gray-500 mr-2 block sm:inline mb-1">原句片段：</span>
                ${contextHtml}
              </div>
              <div class="flex flex-col sm:flex-row gap-4 mb-4">
                <div class="bg-white px-4 py-3 rounded-lg border border-red-200 flex-1">
                  <span class="text-sm text-gray-500 block mb-1">您的答案 ❌</span>
                  <span class="text-red-600 font-bold text-lg line-through">${userAnswer}</span>
                </div>
                <div class="bg-white px-4 py-3 rounded-lg border border-green-200 flex-1">
                  <span class="text-sm text-gray-500 block mb-1">正確答案 ✅</span>
                  <span class="text-green-600 font-bold text-lg">${b.correct}</span>
                </div>
              </div>
              <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100">
                <span class="font-bold text-indigo-700 block mb-1">💡 解析說明：</span>
                <span class="text-gray-700">${b.explanation}</span>
              </div>
            </div>
          `;
        }).join('');

        errorsHtml = `
          <div class="mb-10">
            <h3 class="text-2xl font-black text-red-600 mb-6 flex items-center gap-2 border-l-4 border-red-500 pl-3">
              📝 錯誤題目解析
            </h3>
            <div class="space-y-6">
              ${errorListHtml}
            </div>
          </div>
        `;
      }

      const scoreColor = isHighScore ? 'text-green-500' : 'text-indigo-600';
      const summaryText = incorrectBlanks.length === 0 
        ? '🏆 太神啦！完美全對！' 
        : `您答對了 ${state.topic.blanks.length - incorrectBlanks.length} 題，答錯了 ${incorrectBlanks.length} 題`;

      return `
        <div class="max-w-4xl w-full mx-auto mt-6 sm:mt-10 p-6 sm:p-10 bg-white rounded-2xl shadow-xl relative overflow-hidden">
          ${confettiHtml}
          <div class="text-center mb-10 border-b pb-8">
            <h2 class="text-3xl sm:text-4xl font-black text-gray-800 mb-4">測驗結算 📊</h2>
            <div class="text-6xl sm:text-8xl font-extrabold my-6 ${scoreColor}">
              ${finalScore} <span class="text-2xl sm:text-4xl text-gray-400">分</span>
            </div>
            <p class="text-lg font-bold text-gray-600">${summaryText}</p>
          </div>
          ${errorsHtml}
          <div class="text-center mt-10 flex flex-col sm:flex-row justify-center gap-4">
            <button data-action="menu" class="px-8 py-4 bg-gray-800 hover:bg-gray-900 text-white rounded-xl font-bold text-lg transition-all shadow-lg hover:shadow-xl w-full sm:w-auto">
              🏠 返回首頁
            </button>
            <button data-action="retry" class="px-8 py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold text-lg transition-all shadow-lg hover:shadow-xl w-full sm:w-auto">
              🔄 再測一次
            </button>
          </div>
        </div>
      `;
    };

    // === 事件綁定 (Event Delegation) ===
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;

      const action = btn.dataset.action;

      // 進入預習畫面
      if (action === 'goToPreview') {
        const topicId = btn.dataset.topicId;
        state.topic = quizData.find(t => t.id === topicId);
        state.previewParagraphs = [];
        state.screen = 'preview';
        render();
        window.scrollTo(0, 0);
      }
      
      // 播放語音
      else if (action === 'speak') {
        const idx = parseInt(btn.dataset.idx, 10);
        const textToRead = state.previewParagraphs[idx];
        if (textToRead) {
          speakText(textToRead);
        }
      }

      // 開始正式測驗
      else if (action === 'startQuiz') {
        stopSpeaking(); // 確保離開預習頁面時停止語音
        state.answers = {};
        state.activeBlankId = 0;
        const words = state.topic.blanks.map(b => b.correct);
        state.wordBank = shuffleArray(words);
        state.screen = 'playing';
        render();
        window.scrollTo(0, 0);
      }

      else if (action === 'blank') {
        const blankId = parseInt(btn.dataset.id, 10);
        state.activeBlankId = blankId;
        if (state.answers[blankId]) {
          delete state.answers[blankId];
        }
        render();
      }

      else if (action === 'word') {
        if (state.activeBlankId === null) return;
        const word = btn.dataset.word;
        
        state.answers[state.activeBlankId] = word;

        const blanks = state.topic.blanks;
        let nextBlankId = null;
        for (let i = state.activeBlankId + 1; i < blanks.length; i++) {
          if (!state.answers[i] && state.answers[i] !== word) {
            nextBlankId = i;
            break;
          }
        }
        if (nextBlankId === null) {
          for (let i = 0; i < state.activeBlankId; i++) {
            if (!state.answers[i] && state.answers[i] !== word) {
              nextBlankId = i;
              break;
            }
          }
        }
        state.activeBlankId = nextBlankId;
        render();
      }

      else if (action === 'submit') {
        const isComplete = Object.keys(state.answers).length === state.topic.blanks.length;
        if (!isComplete) {
          if (!window.confirm("還有空格尚未填寫，確定要提早交卷嗎？")) {
            return;
          }
        }
        stopSpeaking();
        state.screen = 'results';
        render();
        window.scrollTo(0, 0);
      }

      // 回首頁
      else if (action === 'menu') {
        stopSpeaking();
        state.screen = 'menu';
        state.topic = null;
        render();
        window.scrollTo(0, 0);
      }

      // 再測一次
      else if (action === 'retry') {
        stopSpeaking();
        state.answers = {};
        state.activeBlankId = 0;
        const words = state.topic.blanks.map(b => b.correct);
        state.wordBank = shuffleArray(words);
        state.screen = 'playing';
        render();
        window.scrollTo(0, 0);
      }
    });

    // 監聽滑竿拖曳事件 (同步更新播放速度與標籤)
    document.addEventListener('input', (e) => {
      if (e.target.dataset.action === 'changeSpeed') {
        const val = parseInt(e.target.value, 10);
        state.playbackSpeed = speedMap[val];
        
        // 同步畫面上所有的滑竿與速度標籤
        document.querySelectorAll('input[data-action="changeSpeed"]').forEach(slider => {
          slider.value = val;
        });
        document.querySelectorAll('.speed-label').forEach(label => {
          label.textContent = state.playbackSpeed + 'x';
        });

        // 停止目前的語音 (讓學生重新點擊播放以適應新語速)
        stopSpeaking();
      }
    });

    // 初始化
    render();

  </script>
</body>
</html>
