

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>單字填空測驗 - Lesson 6</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 自訂動畫，模擬 React 版本的效果 */
    @keyframes fadeInZoom {
      0% { opacity: 0; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }
    }
    .animate-feedback {
      animation: fadeInZoom 0.2s ease-out forwards;
    }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

  <!-- 主容器 -->
  <div id="app-container" class="min-h-screen flex items-center justify-center p-4">
    
    <!-- 開始畫面 -->
    <div id="screen-start" class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center block">
      <h1 class="text-3xl font-bold text-slate-800 mb-4">單字填空測驗</h1>
      <p class="text-slate-600 mb-8">Lesson 6: Dabbawalas: Door-to-Door Meal Delivery in Mumbai</p>
      <div class="bg-blue-50 text-blue-800 p-4 rounded-lg mb-8 text-sm text-left space-y-2">
        <p>💡 <strong>測驗說明：</strong></p>
        <ul class="list-disc pl-5">
          <li>共有 <span id="total-words-count">23</span> 個單字需要挑戰。</li>
          <li>請根據中文提示與例句上下文，輸入正確的英文單字。</li>
          <li>遇到時態或複數變化時，輸入原形或變化形皆可過關。</li>
          <li>點擊喇叭圖示可以聆聽發音。</li>
        </ul>
      </div>
      <button id="btn-start" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl flex items-center justify-center gap-2 transition-colors">
        <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        開始測驗
      </button>
    </div>

    <!-- 遊戲畫面 -->
    <div id="screen-game" class="max-w-xl w-full hidden">
      <!-- 進度條 -->
      <div class="mb-6">
        <div class="flex justify-between text-sm text-slate-500 font-medium mb-2 px-1">
          <span id="progress-text">單字 1 / 23</span>
          <span id="score-text">得分: 0</span>
        </div>
        <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
          <div id="progress-bar" class="bg-blue-600 h-full transition-all duration-300 ease-out" style="width: 0%;"></div>
        </div>
      </div>

      <!-- 主要卡片 -->
      <div class="bg-white rounded-2xl shadow-lg border border-slate-100 overflow-hidden">
        
        <!-- 卡片標頭：中文意義與單字發音按鈕 -->
        <div class="p-6 pb-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
          <div id="word-meaning" class="text-2xl font-bold text-slate-800"></div>
          <button id="btn-speak-word" class="p-3 text-blue-600 bg-blue-100 hover:bg-blue-200 rounded-full transition-colors flex-shrink-0" title="聆聽單字發音">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
          </button>
        </div>

        <!-- 卡片內容：例句與輸入框 -->
        <div class="p-6">
          <div class="bg-slate-50 rounded-xl p-4 mb-6 text-slate-700 leading-relaxed text-lg flex items-start gap-3">
            <button id="btn-speak-sentence" class="mt-1 text-slate-400 hover:text-blue-600 transition-colors flex-shrink-0" title="聆聽完整例句">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
            </button>
            <p id="word-sentence" class="flex-1"></p>
          </div>

          <div class="mb-4">
            <input type="text" id="word-input" placeholder="請輸入英文單字..." autocomplete="off" spellcheck="false" class="w-full text-center text-2xl font-mono p-4 border-2 rounded-xl outline-none transition-colors border-slate-300 focus:border-blue-500 focus:ring-4 focus:ring-blue-100">
          </div>

          <!-- 答題回饋區 -->
          <div id="feedback-correct" class="hidden items-center gap-2 text-green-600 font-bold mb-6 justify-center animate-feedback">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            <span>答對了！</span>
          </div>

          <div id="feedback-incorrect" class="hidden flex-col items-center gap-1 text-red-500 font-bold mb-6 justify-center animate-feedback">
            <div class="flex items-center gap-2">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
              <span>答錯了</span>
            </div>
            <div class="text-slate-600 font-normal mt-2 text-center">
              正確答案：<span id="correct-answer-display" class="font-mono text-blue-600 font-bold text-lg"></span>
              <span id="base-word-display" class="text-sm text-slate-500 ml-2 hidden"></span>
            </div>
          </div>

          <!-- 操作按鈕 -->
          <button id="btn-action" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition-colors disabled:bg-slate-200 disabled:text-slate-400 disabled:cursor-not-allowed flex items-center justify-center gap-2">
            <span>送出檢查 (Enter)</span>
          </button>
        </div>
      </div>
    </div>

    <!-- 結束畫面 -->
    <div id="screen-end" class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center hidden">
      <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-600 w-10 h-10"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
      </div>
      <h2 class="text-3xl font-bold text-slate-800 mb-2">測驗完成！</h2>
      <p class="text-slate-600 mb-8">您的最終得分</p>
      
      <div id="final-score" class="text-5xl font-black text-blue-600 mb-8">0 / 23</div>
      
      <p id="end-message" class="text-slate-600 mb-8"></p>

      <button id="btn-restart" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-6 rounded-xl flex items-center justify-center gap-2 transition-colors">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
        重新測驗
      </button>
    </div>

  </div>

  <script>
    // 單字資料
    const vocabData = [
      { base: "enterprise", meaning: "組織；公司；企業", sentence: "Mrs. Watson's clothing company employs over a thousand workers. It is therefore a very large _____.", answers: ["enterprise"], displayAnswer: "enterprise" },
      { base: "transaction", meaning: "交易；買賣", sentence: "Every time someone buys something at the convenience store, the _____ is saved in the shop's computer system.", answers: ["transaction"], displayAnswer: "transaction" },
      { base: "rate", meaning: "比率", sentence: "The total number of visitors to the zoo is increasing at a _____ of around fifty thousand people a year.", answers: ["rate"], displayAnswer: "rate" },
      { base: "merely", meaning: "僅僅；只不過", sentence: "It's best to thank someone in person rather than _____ send them an email or a text message.", answers: ["merely"], displayAnswer: "merely" },
      { base: "accuracy", meaning: "準確性", sentence: "The problem is that the more we go into the past, the less _____ we can attain.", answers: ["accuracy"], displayAnswer: "accuracy" },
      { base: "suburb", meaning: "郊區；城外", sentence: "Most people live out in the _____ and travel into the city center for work every workday.", answers: ["suburb", "suburbs"], displayAnswer: "suburbs" },
      { base: "commute", meaning: "上下班路程 (n.) / 通勤 (v.)", sentence: "For many passengers on the bus, the daily _____ home from work is a good time to read a book.", answers: ["commute"], displayAnswer: "commute" },
      { base: "network", meaning: "網絡；網狀系統", sentence: "Switzerland's well-developed rail _____ allows you to travel by train to almost anywhere in the country within just a few hours.", answers: ["network"], displayAnswer: "network" },
      { base: "efficiency", meaning: "效率；效能", sentence: "The workers are spending too much time waiting in line to make copies. Thus, a second printer in the office will increase _____.", answers: ["efficiency"], displayAnswer: "efficiency" },
      { base: "roughly", meaning: "大約；差不多", sentence: "We didn't count everyone, but _____ speaking, there were around thirty people at the party.", answers: ["roughly"], displayAnswer: "roughly" },
      { base: "swiftly", meaning: "迅速地", sentence: "Running _____ to get away from the young lions, the zebra just managed to escape being caught and eaten.", answers: ["swiftly"], displayAnswer: "swiftly" },
      { base: "sort", meaning: "種類；類別 (n.) / 分類 (v.)", sentence: "At the traditional market, you'll find all _____ of food, including fried snacks, baked goods, meat and seafood, and fresh fruit.", answers: ["sort", "sorts"], displayAnswer: "sorts" },
      { base: "load", meaning: "負重；負荷 (n.) / 裝載 (v.)", sentence: "With two more reindeer at the front, Santa's sleigh should be able to carry a heavy _____.", answers: ["load"], displayAnswer: "load" },
      { base: "retrace", meaning: "沿原路返回；折回", sentence: "With the security guard approaching, the thief swiftly _____ his steps to the wall and hid in the shadows.", answers: ["retrace", "retraced"], displayAnswer: "retraced" },
      { base: "massive", meaning: "龐大的；巨大的", sentence: "The existence of snakes can be traced all the way back to the time when _____ thirty-ton dinosaurs ruled the earth.", answers: ["massive"], displayAnswer: "massive" },
      { base: "handle", meaning: "搬動；觸摸；弄", sentence: "Don't _____ any of the cubs, because the mother bear might reject them if they smell of humans.", answers: ["handle"], displayAnswer: "handle" },
      { base: "code", meaning: "密碼；暗碼 (n.) / 編碼 (v.)", sentence: "Before our soldiers crack the _____ , the messages enemy generals had been sending each other didn't seem to make much sense.", answers: ["code"], displayAnswer: "code" },
      { base: "particular", meaning: "特定的", sentence: "Is there anything in _____ that Grandpa would like for Christmas, or does he want us to surprise him?", answers: ["particular"], displayAnswer: "particular" },
      { base: "scheme", meaning: "系統；配置", sentence: "Martin came up with an ingenious _____ to organize all the kitchen items, so storing them is consequently much easier.", answers: ["scheme"], displayAnswer: "scheme" },
      { base: "tactic", meaning: "策略；手法", sentence: "Because the other boxer had a powerful left hook, Vinny's _____ was to try to stay on his left side.", answers: ["tactic"], displayAnswer: "tactic" },
      { base: "flawless", meaning: "無瑕的；完美的", sentence: "After such a _____ dance routine, the judges had no choice but to give the couple a perfect ten.", answers: ["flawless"], displayAnswer: "flawless" },
      { base: "classic", meaning: "典型的；有代表性的", sentence: "Allen punched Ken in the face after finding out that Ken had written a love letter to his girlfriend. It was a _____ case of jealousy.", answers: ["classic"], displayAnswer: "classic" },
      { base: "excellence", meaning: "優秀；傑出", sentence: "It took years of practice for the singer to achieve _____ in such demanding opera singing.", answers: ["excellence"], displayAnswer: "excellence" }
    ];

    // 應用程式狀態
    let currentIndex = 0;
    let score = 0;
    let status = 'playing'; // 'playing', 'correct', 'incorrect'

    // DOM 元素參考
    const screens = {
      start: document.getElementById('screen-start'),
      game: document.getElementById('screen-game'),
      end: document.getElementById('screen-end')
    };
    
    const ui = {
      totalWords: document.getElementById('total-words-count'),
      progressText: document.getElementById('progress-text'),
      scoreText: document.getElementById('score-text'),
      progressBar: document.getElementById('progress-bar'),
      meaning: document.getElementById('word-meaning'),
      sentence: document.getElementById('word-sentence'),
      input: document.getElementById('word-input'),
      feedbackCorrect: document.getElementById('feedback-correct'),
      feedbackIncorrect: document.getElementById('feedback-incorrect'),
      correctAnswerDisplay: document.getElementById('correct-answer-display'),
      baseWordDisplay: document.getElementById('base-word-display'),
      btnAction: document.getElementById('btn-action'),
      btnActionText: document.querySelector('#btn-action span'),
      finalScore: document.getElementById('final-score'),
      endMessage: document.getElementById('end-message')
    };

    // 初始化
    ui.totalWords.textContent = vocabData.length;

    // 發音功能
    function speak(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        window.speechSynthesis.speak(utterance);
      } else {
        alert("您的瀏覽器不支援語音發音功能。");
      }
    }

    // 顯示指定畫面
    function showScreen(screenName) {
      Object.values(screens).forEach(screen => {
        screen.classList.add('hidden');
        screen.classList.remove('block');
      });
      screens[screenName].classList.remove('hidden');
      screens[screenName].classList.add('block');
    }

    // 更新遊戲畫面 UI
    function updateGameUI() {
      const currentWord = vocabData[currentIndex];
      
      // 更新進度與分數
      ui.progressText.textContent = `單字 ${currentIndex + 1} / ${vocabData.length}`;
      ui.scoreText.textContent = `得分: ${score}`;
      ui.progressBar.style.width = `${(currentIndex / vocabData.length) * 100}%`;
      
      // 更新字義
      ui.meaning.textContent = currentWord.meaning;
      
      // 更新例句（處理空格）
      renderSentence(currentWord);

      // 更新輸入框狀態
      ui.input.value = status === 'playing' ? ui.input.value : ui.input.value;
      ui.input.className = `w-full text-center text-2xl font-mono p-4 border-2 rounded-xl outline-none transition-colors `;
      
      if (status === 'playing') {
        ui.input.className += 'border-slate-300 focus:border-blue-500 focus:ring-4 focus:ring-blue-100';
        ui.input.disabled = false;
        ui.input.focus();
        
        ui.feedbackCorrect.classList.add('hidden');
        ui.feedbackCorrect.classList.remove('flex');
        ui.feedbackIncorrect.classList.add('hidden');
        ui.feedbackIncorrect.classList.remove('flex');
        
        ui.btnAction.className = 'w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition-colors disabled:bg-slate-200 disabled:text-slate-400 disabled:cursor-not-allowed flex items-center justify-center gap-2';
        ui.btnAction.innerHTML = `<span>送出檢查 (Enter)</span>`;
        checkInputState();
      } 
      else if (status === 'correct') {
        ui.input.className += 'border-green-500 bg-green-50 text-green-700';
        ui.input.disabled = true;
        
        ui.feedbackCorrect.classList.remove('hidden');
        ui.feedbackCorrect.classList.add('flex');
        ui.feedbackIncorrect.classList.add('hidden');
        ui.feedbackIncorrect.classList.remove('flex');
        
        ui.btnAction.className = 'w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-xl transition-colors flex items-center justify-center gap-2';
        ui.btnAction.innerHTML = `<span>${currentIndex < vocabData.length - 1 ? '下一個單字' : '查看成績'}</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>`;
        ui.btnAction.disabled = false;
      } 
      else if (status === 'incorrect') {
        ui.input.className += 'border-red-500 bg-red-50 text-red-700';
        ui.input.disabled = true;
        
        ui.correctAnswerDisplay.textContent = currentWord.displayAnswer;
        if (currentWord.base !== currentWord.displayAnswer) {
          ui.baseWordDisplay.textContent = `(原形: ${currentWord.base})`;
          ui.baseWordDisplay.classList.remove('hidden');
        } else {
          ui.baseWordDisplay.classList.add('hidden');
        }

        ui.feedbackIncorrect.classList.remove('hidden');
        ui.feedbackIncorrect.classList.add('flex');
        ui.feedbackCorrect.classList.add('hidden');
        ui.feedbackCorrect.classList.remove('flex');
        
        ui.btnAction.className = 'w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-6 rounded-xl transition-colors flex items-center justify-center gap-2';
        ui.btnAction.innerHTML = `<span>${currentIndex < vocabData.length - 1 ? '下一個單字' : '查看成績'}</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>`;
        ui.btnAction.disabled = false;
      }
    }

    // 渲染例句（處理填空底線）
    function renderSentence(word) {
      const parts = word.sentence.split('_____');
      let html = '';
      
      parts.forEach((part, i) => {
        html += `<span>${part}</span>`;
        if (i !== parts.length - 1) {
          let innerText = '_____';
          let spanClass = 'inline-block px-2 text-slate-400 border-b-2 border-slate-300 min-w-[80px] text-center font-mono';
          
          if (status === 'correct') {
            innerText = word.displayAnswer;
            spanClass += ' text-green-600 font-bold border-green-500';
          } else if (status === 'incorrect') {
            innerText = ui.input.value || '?';
            spanClass += ' text-red-500 font-bold border-red-500';
          }
          
          html += `<span class="${spanClass}">${innerText}</span>`;
        }
      });
      
      ui.sentence.innerHTML = html;
    }

    // 檢查輸入框狀態（是否為空）
    function checkInputState() {
      if (status === 'playing') {
        ui.btnAction.disabled = ui.input.value.trim() === '';
      }
    }

    // 驗證答案
    function checkAnswer() {
      if (!ui.input.value.trim()) return;
      
      const currentWord = vocabData[currentIndex];
      const inputVal = ui.input.value.trim().toLowerCase();
      
      const isCorrect = currentWord.answers.some(ans => ans.toLowerCase() === inputVal);

      if (isCorrect) {
        status = 'correct';
        score++;
        speak(currentWord.displayAnswer);
      } else {
        status = 'incorrect';
      }
      
      updateGameUI();
    }

    // 進行下一題或結束
    function nextWord() {
      if (currentIndex < vocabData.length - 1) {
        currentIndex++;
        ui.input.value = '';
        status = 'playing';
        updateGameUI();
      } else {
        finishGame();
      }
    }

    // 結束遊戲
    function finishGame() {
      ui.finalScore.textContent = `${score} / ${vocabData.length}`;
      
      if (score === vocabData.length) {
        ui.endMessage.className = "text-green-600 font-medium mb-8";
        ui.endMessage.textContent = "太棒了！您答對了所有單字！ 🎉";
      } else {
        ui.endMessage.className = "text-slate-600 mb-8";
        ui.endMessage.textContent = "繼續努力，多練習幾次一定會更進步！";
      }
      
      showScreen('end');
    }

    // 重新開始
    function restartGame() {
      currentIndex = 0;
      score = 0;
      ui.input.value = '';
      status = 'playing';
      updateGameUI();
      showScreen('game');
    }

    // 綁定事件監聽器
    document.getElementById('btn-start').addEventListener('click', () => {
      showScreen('game');
      updateGameUI();
    });

    document.getElementById('btn-speak-word').addEventListener('click', () => {
      speak(vocabData[currentIndex].base);
    });

    document.getElementById('btn-speak-sentence').addEventListener('click', () => {
      const currentWord = vocabData[currentIndex];
      speak(currentWord.sentence.replace('_____', currentWord.displayAnswer));
    });

    ui.input.addEventListener('input', checkInputState);
    
    ui.input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (status === 'playing' && !ui.btnAction.disabled) {
          checkAnswer();
        } else if (status === 'correct' || status === 'incorrect') {
          nextWord();
        }
      }
    });

    ui.btnAction.addEventListener('click', () => {
      if (status === 'playing') {
        checkAnswer();
      } else {
        nextWord();
      }
    });

    document.getElementById('btn-restart').addEventListener('click', restartGame);

  </script>
</body>
</html>
