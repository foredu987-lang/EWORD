      {
        id: 'march24-26-ai',
        title: '主題 2：What I Use AI For & Store Conversations',
        content: "As AI technology has become ___0___ (越來越普及/容易取得), people have found various ways to ___1___ (利用) it in their daily routines. The bar chart ___2___ (說明/圖解) the primary purposes for which people report using AI chatbots.\n\nThe most common purpose was learning and education, which was ___3___ (提及/引用) by 1,402 of the survey ___4___ (受訪者), followed closely by work ___5___ (協助/輔助) at 1,248. Creative writing ___6___ (在數量上佔...) 905 users, with ___7___ (休閒對話) accounting for 613. ___8___ (數量更少的) reported using AI for technical problem-solving (495 people), translation (237), and other uses (100). These ___9___ (統計數據) reveal that people most commonly rely on AI to ___10___ (提升) ___11___ (生產力) and ___12___ (獲得) knowledge. At the same time, the significant use of AI in creative applications ___13___ (指出/顯示) that many people see AI as a helpful tool for imaginative ___14___ (嘗試/努力).\n\nPersonally, I use AI chatbots most frequently for learning purposes. For instance, when I ___15___ (遭遇/遇到) complex grammar structures or ___16___ (不熟悉的詞彙) when studying English, I can ask the chatbot for clear explanations and practical examples. This immediate ___17___ (回饋/回饋意見) ___18___ (加速) my learning process. Beyond efficiency, what I value most is the ___19___ (不加批判的) nature of AI. Unlike asking a person, I never feel ___20___ (尷尬的) about asking basic questions or requesting multiple explanations of the same concept. This creates a comfortable learning environment where curiosity is encouraged rather than limited by ___21___ (社會顧慮).\n\n--- Buying Microwavable Food ---\nSophia brings some ___22___ (可微波的) ___23___ (義大利麵) to the counter.\nSophia: I'll pay for this with ___24___ (行動支付). Please store the ___25___ (收據/發票) in my e-receipt ___26___ (載具).\nClerk: No problem.\nSophia: Can you ___27___ (加熱) for me?\nClerk: Actually, we have several self-service ___28___ (微波爐) over there that you can use... There are also ___29___ (餐具) available in the ___30___ (櫥櫃) below the microwaves if you need any.\n\n--- Paying Bills and Picking Up a Parcel ---\nLucas returns to the convenience store to pay some bills and pick up a ___31___ (包裹).\nClerk: Sure, let me ___32___ (處理) that for you. Your total is $510.\nLucas: Here you are.\nClerk: ___33___ (一切就緒). Here's your change, $40.\nLucas: Thanks. I also need to pick up a package.\nClerk: No problem. Can you give me the last three ___34___ (數字) of your phone number?\nLucas: It's 487.\nClerk: OK, just a moment. (She ___35___ (取回/拿回) the package.) This should be it. Are you Mr. Ramirez?\nLucas: Yes, that's me.\nClerk: Great. That's $200 for the package.\nLucas: Fabulous! ( = ___36___ ) Thank you.",

    // === 載入系統可用語音 ===
    let availableVoices = [];
    const loadVoices = () => {
      try {
        if (!window.speechSynthesis) return;
        const voices = window.speechSynthesis.getVoices().filter(v => v.lang.includes('en'));
        if (voices.length > 0 && availableVoices.length !== voices.length) {
          availableVoices = voices;
          if (state.screen === 'preview') {
            render(); 
          }
        }
      } catch (e) {
        console.warn("語音載入失敗:", e);
      }
    };

    // 全域解鎖語音權限 (針對手機瀏覽器)
    let audioUnlocked = false;
    document.addEventListener('click', () => {
      if (!audioUnlocked && 'speechSynthesis' in window) {
        let unlockUtterance = new SpeechSynthesisUtterance('');
        unlockUtterance.volume = 0;
        window.speechSynthesis.speak(unlockUtterance);
        audioUnlocked = true;
        loadVoices();
      }
    }, { once: true });

    if ('speechSynthesis' in window) {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = loadVoices;
      let retryCount = 0;
      const voiceInterval = setInterval(() => {
        loadVoices();
        retryCount++;
        if (availableVoices.length > 0 || retryCount > 10) {
          clearInterval(voiceInterval);
        }
      }, 500);
    }

    // === 狀態管理 ===
    let state = {
      screen: 'menu', 
      topic: null,
      previewParagraphs: [], 
      answers: {},
      activeBlankId: null,
      wordBank: [],
      playbackSpeed: 1.0, 
      selectedVoiceURI: null 
    };

    const speedMap = [0.5, 0.8, 0.9, 1.0]; 
    const appContainer = document.getElementById('app');

    // === 輔助函式 ===
    const shuffleArray = (array) => {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };

    const calculateScore = () => {
      let correctCount = 0;
      state.topic.blanks.forEach(b => {
        if (state.answers[b.id] === b.correct) correctCount++;
      });
      return Math.round((correctCount / state.topic.blanks.length) * 100);
    };

    const getFilledText = (content, blanks) => {
      return content.replace(/___(\d+)___/g, (match, idStr) => {
        const id = parseInt(idStr, 10);
        const blank = blanks.find(b => b.id === id);
        return blank ? blank.correct : match;
      });
    };

    // === TTS 語音引擎 (【只念題目與正確答案】自然語氣演算法版) ===
    const stopSpeaking = () => {
      try {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
        }
      } catch(e){}
    };

    const speakText = (text, btnElement) => {
      try {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          
          setTimeout(() => {
            // 1. 完全移除括號 () 與 [] 中的所有文字 (包含中文解釋、額外選項等干擾)
            let cleanText = text.replace(/\([^\)]*\)/g, ' ');
            cleanText = cleanText.replace(/\[[^\]]*\]/g, ' ');

            // 2. 移除殘留的中文字
            cleanText = cleanText.replace(/[\u4e00-\u9fa5]/g, ' '); 
            
            // 3. 將破折號、斜線、星星等符號替換為「逗號」，讓 TTS 產生自然的呼吸停頓
            cleanText = cleanText.replace(/[\*\/\-]/g, ', '); 
            cleanText = cleanText.replace(/_/g, ' ');

            // 4. 清理多餘的空白與重複的逗號，讓句子完美順暢
            cleanText = cleanText.replace(/\s+/g, ' ').trim(); 
            cleanText = cleanText.replace(/,(\s*,)+/g, ',');

            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'en-US';
            utterance.rate = state.playbackSpeed; 

            if (state.selectedVoiceURI) {
              const chosenVoice = availableVoices.find(v => v.voiceURI === state.selectedVoiceURI);
              if (chosenVoice) utterance.voice = chosenVoice;
            } else {
              const bestVoice = availableVoices.find(v => 
                v.name.includes('Google US English') || 
                v.name.includes('Samantha') || 
                v.name.includes('Siri')
              );
              if (bestVoice) {
                utterance.voice = bestVoice;
              }
            }

            window.speechSynthesis.speak(utterance);
          }, 50);

        } else {
          if(btnElement) btnElement.innerHTML = "❌ 瀏覽器不支援";
        }
      } catch (e) {
         if(btnElement) btnElement.innerHTML = "❌ 語音錯誤";
      }
    };

    // === 畫面渲染 ===
    const render = () => {
      // 記錄捲軸位置 (解決點擊後畫面跳轉回最上方的問題)
      let articleScroll = 0;
      let wordbankScroll = 0;
      const articleEl = document.getElementById('article-container');
      const wordbankEl = document.getElementById('wordbank-container');

      if (articleEl) articleScroll = articleEl.scrollTop;
      if (wordbankEl) wordbankScroll = wordbankEl.scrollTop;

      if (state.screen === 'menu') appContainer.innerHTML = renderMenu();
      else if (state.screen === 'preview') appContainer.innerHTML = renderPreview();
      else if (state.screen === 'playing') appContainer.innerHTML = renderPlaying();
      else if (state.screen === 'results') appContainer.innerHTML = renderResults();

      // 恢復捲軸位置
      const newArticleEl = document.getElementById('article-container');
      const newWordbankEl = document.getElementById('wordbank-container');

      if (newArticleEl && articleScroll > 0) newArticleEl.scrollTop = articleScroll;
      if (newWordbankEl && wordbankScroll > 0) newWordbankEl.scrollTop = wordbankScroll;
    };

    const renderMenu = () => {
      let topicsHtml = quizData.map(topic => `
        <button data-action="goToPreview" data-topic-id="${topic.id}" class="text-left w-full p-5 sm:p-6 rounded-xl border-2 border-indigo-100 hover:border-indigo-500 hover:bg-indigo-50 transition-all duration-200 shadow-sm flex items-center gap-4">
          <span class="text-3xl">📝</span>
          <div>
            <h2 class="text-lg sm:text-xl font-bold text-gray-800">${topic.title}</h2>
            <p class="text-gray-500 text-sm mt-1">含 ${topic.blanks.length} 個克漏字空格與段落發音預習</p>
          </div>
        </button>
      `).join('');

      return `
        <div class="max-w-4xl w-full mx-auto mt-6 sm:mt-12 p-6 sm:p-10 bg-white rounded-2xl shadow-xl border-t-8 border-indigo-600">
          <div class="text-center mb-10">
            <h1 class="text-3xl sm:text-4xl font-extrabold text-indigo-700 mb-4 tracking-wide">0412 考卷填空挑戰 🧩</h1>
            <p class="text-gray-600 text-base sm:text-lg">選擇一份考卷，先預習發音，再挑戰克漏字填空！</p>
          </div>
          <div class="flex flex-col gap-4">
            ${topicsHtml}
          </div>
        </div>
      `;
    };

    const renderPreview = () => {
      const rawParagraphs = state.topic.content.split(/\n\n/);
      const speedIndex = speedMap.indexOf(state.playbackSpeed) !== -1 ? speedMap.indexOf(state.playbackSpeed) : 3; 
      
      let paragraphsHtml = rawParagraphs.map((para, index) => {
        const filledParaText = getFilledText(para, state.topic.blanks);
        state.previewParagraphs[index] = filledParaText; 

        const highlightedHtml = para.replace(/___(\d+)___/g, (match, idStr) => {
          const id = parseInt(idStr, 10);
          const blank = state.topic.blanks.find(b => b.id === id);
          return `<span class="text-indigo-700 font-extrabold bg-indigo-100 px-1 rounded underline">${blank.correct}</span>`;
        }).replace(/\n/g, '<br>');

        return `
          <div class="relative bg-slate-50 p-5 rounded-xl border border-slate-200 mb-6 group">
            <button data-action="speak" data-idx="${index}" class="absolute top-3 right-3 bg-white border border-gray-300 shadow-sm text-gray-600 hover:bg-indigo-100 hover:text-indigo-700 hover:border-indigo-300 px-3 py-1.5 rounded-full text-sm font-bold flex items-center gap-1 transition-all z-10">
              🔊 播放段落
            </button>
            <p class="text-lg text-gray-800 leading-loose pt-10 sm:pt-0 sm:pr-28 relative break-words">
              ${highlightedHtml}
            </p>
            
            <div class="mt-4 pt-3 border-t border-slate-200 flex items-center justify-end gap-2 sm:gap-3">
              <span class="text-sm font-bold text-gray-500">🔊 語速:</span>
              <input type="range" data-action="changeSpeed" min="0" max="3" step="1" value="${speedIndex}" class="w-24 sm:w-32 cursor-pointer">
              <span class="speed-label text-sm font-bold text-indigo-700 w-10 text-right">${state.playbackSpeed}x</span>
            </div>
          </div>
        `;
      }).join('');

      let voiceOptionsHtml = '';
      if (availableVoices.length === 0) {
        voiceOptionsHtml = '<option value="">載入中... (若無聲請以 Safari/Chrome 開啟)</option>';
      } else {
        voiceOptionsHtml = availableVoices.map(v => 
          `<option value="${v.voiceURI}" ${state.selectedVoiceURI === v.voiceURI ? 'selected' : ''}>${v.name}</option>`
        ).join('');
      }

      return `
        <div class="max-w-4xl w-full mx-auto mt-4 sm:mt-8 p-5 sm:p-8 bg-white rounded-2xl shadow-xl border-t-8 border-yellow-400">
          <div class="text-center mb-6">
            <span class="bg-yellow-100 text-yellow-800 font-bold px-3 py-1 rounded-full text-sm mb-3 inline-block">考前預習模式</span>
            <h2 class="text-2xl sm:text-3xl font-black text-gray-800">${state.topic.title}</h2>
            <p class="text-gray-500 mt-2">請先閱讀完整句子，點擊右上方喇叭可聆聽發音。</p>
          </div>

          <div class="flex justify-center items-center gap-4 mb-6 bg-white p-3 rounded-xl border border-gray-200 shadow-sm mx-auto max-w-md">
            <div class="flex items-center gap-2 w-full">
              <span class="text-sm font-bold text-gray-500 shrink-0">🗣️ 更換語音:</span>
              <select data-action="changeVoice" class="flex-1 p-2 rounded-lg border border-gray-300 text-sm font-medium text-gray-700 focus:ring-2 focus:ring-indigo-500 outline-none truncate bg-white">
                ${voiceOptionsHtml}
              </select>
            </div>
          </div>

          <div class="flex justify-center mb-8">
            <button data-action="startQuiz" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-10 rounded-full shadow-md transition-all transform hover:scale-105 text-lg">
              👉 我準備好了，開始測驗！
            </button>
          </div>

          <div class="mb-8">
            ${paragraphsHtml}
          </div>

          <div class="flex justify-center mt-8 border-t pt-8 border-gray-100">
            <button data-action="startQuiz" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-12 rounded-full shadow-lg transition-all transform hover:scale-105 text-xl">
              👉 閱讀完畢，開始測驗！
            </button>
          </div>
        </div>
      `;
    };

    const renderPlaying = () => {
      const parts = state.topic.content.split(/(___\d+___)/g);
      const articleHtml = parts.map(part => {
        const match = part.match(/___(\d+)___/);
        if (match) {
          const blankId = parseInt(match[1], 10);
          const answer = state.answers[blankId];
          const isActive = state.activeBlankId === blankId;
          
          let btnClass = "mx-1 my-1 px-3 py-0.5 rounded-md min-w-[3.5rem] font-bold transition-all duration-200 border-b-2 ";
          if (isActive) btnClass += "bg-indigo-600 text-white border-indigo-800 shadow-md transform scale-110";
          else if (answer) btnClass += "bg-indigo-100 text-indigo-800 border-indigo-400 hover:bg-indigo-200";
          else btnClass += "bg-gray-100 text-gray-400 border-gray-400 hover:bg-gray-200";
          
          const text = answer ? answer : (isActive ? '選擇中...' : '____');
          return `<button data-action="blank" data-id="${blankId}" class="${btnClass}">${text}</button>`;
        }
        return part.replace(/\n/g, '<br><br>');
      }).join('');

      const usedWords = Object.values(state.answers);
      const filledCount = Object.keys(state.answers).length;
      const totalCount = state.topic.blanks.length;

      const wordBankHtml = state.wordBank.map((word, idx) => {
        const countInAnswers = usedWords.filter(w => w === word).length;
        const countInBank = state.wordBank.slice(0, idx + 1).filter(w => w === word).length;
        const isUsed = countInBank <= countInAnswers;
        
        let btnClass = "px-3 py-2 rounded-lg font-bold text-sm transition-all ";
        let disabledAttr = "";

        if (isUsed) {
          btnClass += "bg-gray-200 text-gray-400 opacity-60 cursor-not-allowed line-through";
          disabledAttr = "disabled";
        } else if (state.activeBlankId !== null) {
          btnClass += "bg-white text-indigo-700 border-2 border-indigo-200 hover:border-indigo-500 hover:bg-indigo-50 shadow-sm active:scale-95";
        } else {
          btnClass += "bg-white text-gray-400 border-2 border-gray-100 cursor-not-allowed";
          disabledAttr = "disabled";
        }

        return `<button data-action="${isUsed ? '' : 'word'}" data-word="${word}" ${disabledAttr} class="${btnClass}">${word}</button>`;
      }).join('');

      const submitBtnClass = filledCount === totalCount 
        ? 'bg-green-500 hover:bg-green-600 text-white animate-bounce' 
        : 'bg-indigo-600 hover:bg-indigo-700 text-white';
      const submitText = filledCount === totalCount ? '確認交卷 ✅' : '提早交卷 (尚未作答完畢)';

      return `
        <div class="max-w-7xl w-full mx-auto mt-2 sm:mt-8 bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col h-[92vh] sm:h-[85vh] border border-gray-200">
          <div class="bg-indigo-50 p-3 sm:p-4 border-b border-indigo-100 shrink-0">
            <div class="flex justify-between items-center mb-1 sm:mb-2">
              <h2 class="text-sm sm:text-base font-bold text-indigo-800 truncate pr-2">${state.topic.title}</h2>
              <span class="bg-indigo-600 text-white text-xs font-bold px-3 py-1 rounded-full whitespace-nowrap shrink-0">
                進度: ${filledCount} / ${totalCount}
              </span>
            </div>
            <p class="text-xs sm:text-sm text-indigo-600 font-medium">
              💡 玩法：1. 點擊文章空格 👉 2. 從右方/下方選擇單字。 (點擊已填空格可取消)
            </p>
          </div>
          
          <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
            <!-- 左欄：文章區塊 (加上 id="article-container" 讓程式能記住捲軸位置) -->
            <div id="article-container" class="flex-1 p-4 sm:p-8 overflow-y-auto text-base sm:text-lg text-gray-800 font-medium leading-loose bg-white break-words">
              ${articleHtml}
            </div>

            <!-- 右欄/下欄：單字庫 (加上 id="wordbank-container") -->
            <div id="wordbank-container" class="w-full md:w-1/3 lg:w-[350px] bg-slate-50 p-4 sm:p-6 border-t-4 md:border-t-0 md:border-l-4 border-slate-200 shrink-0 overflow-y-auto flex flex-col shadow-inner max-h-[35vh] md:max-h-none">
              <h3 class="text-indigo-800 font-bold mb-3 hidden md:flex items-center gap-2">
                <span>🗂️</span> 單字庫 (Word Bank)
              </h3>
              <div class="flex flex-wrap gap-2 sm:gap-3">
                ${wordBankHtml}
              </div>
              <div class="mt-6 md:mt-auto pt-4 flex justify-center border-t border-slate-200 md:border-none">
                <button data-action="submit" class="w-full py-3 rounded-xl font-bold text-lg shadow-md transition-all ${submitBtnClass}">
                  ${submitText}
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
    };

    const renderResults = () => {
      const finalScore = calculateScore();
      const isHighScore = finalScore >= 80;
      const incorrectBlanks = state.topic.blanks.filter(b => state.answers[b.id] !== b.correct);

      let confettiHtml = '';
      if (isHighScore) {
        confettiHtml = '<div class="fixed inset-0 pointer-events-none overflow-hidden z-50">';
        const emojis = ['🎉', '✨', '🏆', '💯', '🔥'];
        for (let i = 0; i < 50; i++) {
          const emoji = emojis[Math.floor(Math.random() * emojis.length)];
          const left = Math.random() * 100;
          const delay = Math.random() * 3;
          const duration = 2 + Math.random() * 3;
          confettiHtml += `<div class="absolute text-3xl animate-confetti" style="left: ${left}vw; animation-delay: ${delay}s; animation-duration: ${duration}s;">${emoji}</div>`;
        }
        confettiHtml += '</div>';
      }

      let errorsHtml = '';
      if (incorrectBlanks.length > 0) {
        const errorListHtml = incorrectBlanks.map(b => {
          const parts = state.topic.content.split(/(?<=[.!?])\s+/);
          const targetTag = `___${b.id}___`;
          const sentence = parts.find(p => p.includes(targetTag)) || "...";
          const contextHtml = sentence.split(targetTag).map((s, i, arr) => {
            return s + (i < arr.length - 1 ? `<span class="text-green-600 font-bold bg-green-100 px-1 rounded mx-1 underline">${b.correct}</span>` : '');
          }).join('');

          const userAnswer = state.answers[b.id] || '(未作答)';

          return `
            <div class="bg-red-50 rounded-xl p-5 border border-red-100">
              <div class="mb-3 text-gray-700 text-base sm:text-lg leading-relaxed break-words">
                <span class="font-bold text-gray-500 mr-2 block sm:inline mb-1">原句片段：</span>
                ${contextHtml}
              </div>
              <div class="flex flex-col sm:flex-row gap-4 mb-4">
                <div class="bg-white px-4 py-3 rounded-lg border border-red-200 flex-1">
                  <span class="text-sm text-gray-500 block mb-1">您的答案 ❌</span>
                  <span class="text-red-600 font-bold text-lg line-through">${userAnswer}</span>
                </div>
                <div class="bg-white px-4 py-3 rounded-lg border border-green-200 flex-1">
                  <span class="text-sm text-gray-500 block mb-1">正確答案 ✅</span>
                  <span class="text-green-600 font-bold text-lg">${b.correct}</span>
                </div>
              </div>
              <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100">
                <span class="font-bold text-indigo-700 block mb-1">💡 解析說明：</span>
                <span class="text-gray-700">${b.explanation}</span>
              </div>
            </div>
          `;
        }).join('');

        errorsHtml = `
          <div class="mb-10">
            <h3 class="text-2xl font-black text-red-600 mb-6 flex items-center gap-2 border-l-4 border-red-500 pl-3">
              📝 錯誤題目解析
            </h3>
            <div class="space-y-6">
              ${errorListHtml}
            </div>
          </div>
        `;
      }

      const scoreColor = isHighScore ? 'text-green-500' : 'text-indigo-600';
      const summaryText = incorrectBlanks.length === 0 
        ? '🏆 太神啦！完美全對！' 
        : `您答對了 ${state.topic.blanks.length - incorrectBlanks.length} 題，答錯了 ${incorrectBlanks.length} 題`;

      return `
        <div class="max-w-4xl w-full mx-auto mt-6 sm:mt-10 p-6 sm:p-10 bg-white rounded-2xl shadow-xl relative overflow-hidden">
          ${confettiHtml}
          <div class="text-center mb-10 border-b pb-8">
            <h2 class="text-3xl sm:text-4xl font-black text-gray-800 mb-4">測驗結算 📊</h2>
            <div class="text-6xl sm:text-8xl font-extrabold my-6 ${scoreColor}">
              ${finalScore} <span class="text-2xl sm:text-4xl text-gray-400">分</span>
            </div>
            <p class="text-lg font-bold text-gray-600">${summaryText}</p>
          </div>
          ${errorsHtml}
          <div class="text-center mt-10 flex flex-col sm:flex-row justify-center gap-4">
            <button data-action="menu" class="px-8 py-4 bg-gray-800 hover:bg-gray-900 text-white rounded-xl font-bold text-lg transition-all shadow-lg hover:shadow-xl w-full sm:w-auto">
              🏠 返回首頁
            </button>
            <button data-action="retry" class="px-8 py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold text-lg transition-all shadow-lg hover:shadow-xl w-full sm:w-auto">
              🔄 再測一次
            </button>
          </div>
        </div>
      `;
    };

    // === 事件綁定 (Event Delegation) ===
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;

      const action = btn.dataset.action;

      if (action === 'goToPreview') {
        const topicId = btn.dataset.topicId;
        state.topic = quizData.find(t => t.id === topicId);
        state.previewParagraphs = [];
        state.screen = 'preview';
        render();
        window.scrollTo(0, 0);
      }
      
      else if (action === 'speak') {
        const idx = parseInt(btn.dataset.idx, 10);
        const textToRead = state.previewParagraphs[idx];
        if (textToRead) {
          speakText(textToRead, btn);
        }
      }

      else if (action === 'startQuiz') {
        stopSpeaking();
        state.answers = {};
        state.activeBlankId = 0;
        const words = state.topic.blanks.map(b => b.correct);
        state.wordBank = shuffleArray(words);
        state.screen = 'playing';
        render();
        window.scrollTo(0, 0);
      }

      else if (action === 'blank') {
        const blankId = parseInt(btn.dataset.id, 10);
        state.activeBlankId = blankId;
        if (state.answers[blankId]) {
          delete state.answers[blankId];
        }
        render();
      }

      else if (action === 'word') {
        if (state.activeBlankId === null) return;
        const word = btn.dataset.word;
        
        state.answers[state.activeBlankId] = word;

        const blanks = state.topic.blanks;
        let nextBlankId = null;
        for (let i = state.activeBlankId + 1; i < blanks.length; i++) {
          if (!state.answers[i] && state.answers[i] !== word) {
            nextBlankId = i;
            break;
          }
        }
        if (nextBlankId === null) {
          for (let i = 0; i < state.activeBlankId; i++) {
            if (!state.answers[i] && state.answers[i] !== word) {
              nextBlankId = i;
              break;
            }
          }
        }
        state.activeBlankId = nextBlankId;
        render();

        // 平滑捲動到下一個空格
        if (nextBlankId !== null) {
            setTimeout(() => {
                const nextBtn = document.querySelector(`button[data-id="${nextBlankId}"]`);
                const articleEl = document.getElementById('article-container');
                if (nextBtn && articleEl) {
                    const btnRect = nextBtn.getBoundingClientRect();
                    const containerRect = articleEl.getBoundingClientRect();
                    if (btnRect.top < containerRect.top || btnRect.bottom > containerRect.bottom) {
                        nextBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            }, 50); 
        }
      }

      else if (action === 'submit') {
        const isComplete = Object.keys(state.answers).length === state.topic.blanks.length;
        
        if (!isComplete) {
          if (btn.dataset.warned !== 'true') {
            btn.dataset.warned = 'true';
            btn.innerHTML = '⚠️ 還有空格未填！確定要交卷？(再按一次)';
            btn.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');
            btn.classList.add('bg-red-500', 'hover:bg-red-600', 'animate-pulse');
            return;
          }
        }

        stopSpeaking();
        state.screen = 'results';
        render();
        window.scrollTo(0, 0);
      }

      else if (action === 'menu') {
        stopSpeaking();
        state.screen = 'menu';
        state.topic = null;
        render();
        window.scrollTo(0, 0);
      }

      else if (action === 'retry') {
        stopSpeaking();
        state.answers = {};
        state.activeBlankId = 0;
        const words = state.topic.blanks.map(b => b.correct);
        state.wordBank = shuffleArray(words);
        state.screen = 'playing';
        render();
        window.scrollTo(0, 0);
      }
    });

    document.addEventListener('input', (e) => {
      if (e.target.dataset.action === 'changeSpeed') {
        const val = parseInt(e.target.value, 10);
        state.playbackSpeed = speedMap[val];
        
        document.querySelectorAll('input[data-action="changeSpeed"]').forEach(slider => {
          slider.value = val;
        });
        document.querySelectorAll('.speed-label').forEach(label => {
          label.textContent = state.playbackSpeed + 'x';
        });

        stopSpeaking();
      }
    });

    document.addEventListener('change', (e) => {
      if (e.target.dataset.action === 'changeVoice') {
        state.selectedVoiceURI = e.target.value;
        stopSpeaking(); 
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
       render();
    });

  </script>
</body>
</html>
